<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Inventario{% endblock %}</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; color: #202124; background: #f7f8fa; }
    header { background: #1f2937; color: white; padding: 16px 24px; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
    main { max-width: 1080px; margin: 0 auto; padding: 24px; }
    a { color: #0f766e; }
    .button, button { background: #0f766e; color: white; border: 0; border-radius: 6px; padding: 9px 14px; text-decoration: none; cursor: pointer; }
    .button.secondary { background: #4b5563; }
    .button.danger { background: #b91c1c; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { text-align: left; border-bottom: 1px solid #e5e7eb; padding: 10px; }
    form { display: grid; gap: 14px; max-width: 760px; }
    .login-page { min-height: calc(100vh - 140px); display: grid; place-items: center; }
    .login-panel { width: min(100%, 380px); background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 24px; }
    .login-panel form { max-width: none; }
    input, select, textarea { width: 100%; box-sizing: border-box; padding: 9px; border: 1px solid #cbd5e1; border-radius: 6px; }
    label { font-weight: 700; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin: 16px 0; }
    .messages { list-style: none; padding: 0; }
    .messages li { background: #dcfce7; border: 1px solid #86efac; padding: 10px; border-radius: 6px; margin-bottom: 8px; }
    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .photo { max-width: 220px; border-radius: 6px; border: 1px solid #e5e7eb; }
  </style>
</head>
<body>
  <header>
    <strong>Inventario TI e Logistica</strong>
    <nav>
      {% if request.user.is_authenticated %}
        <a href="{% url 'inventory:item_list' %}" style="color:white; margin-right:12px">Itens</a>
        <a href="{% url 'inventory:department_list' %}" style="color:white; margin-right:12px">Departamentos</a>
        <span>{{ request.user.username }}</span>
        <form action="{% url 'logout' %}" method="post" style="display:inline">
          {% csrf_token %}
          <button type="submit">Sair</button>
        </form>
      {% endif %}
    </nav>
  </header>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}<li>{{ message }}</li>{% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
