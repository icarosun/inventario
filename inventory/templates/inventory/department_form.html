{% extends "inventory/base.html" %}

{% block title %}Departamento - Inventario{% endblock %}

{% block content %}
  <h1>{% if object %}Editar departamento{% else %}Novo departamento{% endif %}</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="actions">
      <button type="submit">Salvar</button>
      <a class="button secondary" href="{% url 'inventory:department_list' %}">Cancelar</a>
    </div>
  </form>
{% endblock %}
